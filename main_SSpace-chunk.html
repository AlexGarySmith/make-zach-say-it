<div class="container">
  <h1>Make Zach Say It</h1>

  <div class="editor">
    <div class="canvas-container">
      <canvas id="imageCanvas"></canvas>
    </div>

    <div class="controls">
      <div class="control-group">
        <label for="topText">Top Text</label>
        <div class="control-row">
          <div class="control-item">
            <input type="text" id="topText" placeholder="Top text…" autocomplete="off" />
          </div>
          <div class="color-item">
            <label for="topTextColor">Color</label>
            <input type="color" id="topTextColor" value="#ffffff" />
          </div>
        </div>
      </div>

      <div class="control-group">
        <label for="bottomText">Bottom Text</label>
        <div class="control-row">
          <div class="control-item">
            <input type="text" id="bottomText" placeholder="Bottom text…" autocomplete="off" />
          </div>
          <div class="color-item">
            <label for="bottomTextColor">Color</label>
            <input type="color" id="bottomTextColor" value="#ffffff" />
          </div>
        </div>
      </div>

      <div class="control-group">
        <p class="hint">On mobile you can tap, drag, and pinch to move text. Otherwise use the side handle to resize and the top handle to rotate.</p>
      </div>

      <div class="control-group">
        <label for="imageUpload">Upload Your Own Image</label>
        <input type="file" id="imageUpload" accept="image/*" />
        <small>Or use a random picture of Zach.</small>
      </div>

      <div class="control-group">
        <button id="downloadBtn" type="button">Download Zeme</button>
      </div>
    </div>
  </div>

  <p class="carousel-title">Pick a Zimage</p>
  <div class="zimage-carousel">
    <button class="carousel-arrow prev" type="button" aria-label="Previous images">←</button>
    <div class="zimage-carousel-track-wrapper">
      <div id="zimagesGallery" class="zimage-carousel-track"></div>
    </div>
    <button class="carousel-arrow next" type="button" aria-label="Next images">→</button>
  </div>

  <p class="carousel-title">Favorite Zemes</p>
  <div class="zimage-carousel">
    <button class="carousel-arrow prev" type="button" aria-label="Previous zemes">←</button>
    <div class="zimage-carousel-track-wrapper">
      <div id="zemesGallery" class="zimage-carousel-track"></div>
    </div>
    <button class="carousel-arrow next" type="button" aria-label="Next zemes">→</button>
  </div>
</div>

<audio
  id="pageAutoplayMedia"
  preload="auto"
  hidden
  aria-hidden="true"
  src="https://alexgarysmith.github.io/make-zach-say-it/8067370069020863482.m4a"
></audio>

<script src="https://alexgarysmith.github.io/make-zach-say-it/zachez.js"></script>
